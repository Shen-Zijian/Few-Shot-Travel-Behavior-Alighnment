employment_2022_to_unified:
  1: 1   # Full-time employed
  2: 2   # Part-time employed
  3: 4   # Student
  4: 5   # Homemaker / not working
  5: 6   # Retired
  6: 7   # Other

# ============================================================
# INCOME GROUP MAPPING
# ============================================================
# Unified income_group (5 bands):
#   1 = Low (<$10,000/month)
#   2 = Lower-middle ($10,000-$19,999)
#   3 = Middle ($20,000-$39,999)
#   4 = Upper-middle ($40,000-$59,999)
#   5 = High (>=$60,000)
#   0 = Not reported/refused

income_unified_labels:
  0: "Not reported"
  1: "Low"
  2: "Lower-middle"
  3: "Middle"
  4: "Upper-middle"
  5: "High"

# TCS 2011 HH.B15 -> unified_income
# B15 has ~19 income bands + code 97 (refused)
# Mapping confirmed from typical TCS 2011 questionnaire structure
# (<$4k, $4-8k, $8-12k, $12-16k, $16-20k, $20-25k, $25-30k, $30-35k,
#  $35-40k, $40-45k, $45-50k, $50-60k, $60-70k, $70-80k, $80-100k,
#  $100-125k, $125-150k, $150k+, refused)
income_2011_to_unified:
  1: 1   # <$4k -> Low
  2: 1   # $4-8k -> Low
  3: 1   # $8-12k -> Low
  4: 2   # $12-16k -> Lower-middle
  5: 2   # $16-20k -> Lower-middle
  6: 3   # $20-25k -> Middle
  7: 3   # $25-30k -> Middle
  8: 3   # $30-35k -> Middle
  9: 3   # $35-40k -> Middle
  10: 4  # $40-45k -> Upper-middle
  11: 4  # $45-50k -> Upper-middle
  12: 4  # $50-60k -> Upper-middle
  13: 4  # $60-70k -> Upper-middle
  14: 5  # $70-80k -> High
  15: 5  # $80-100k -> High
  16: 5  # $100-125k -> High
  17: 5  # $125-150k -> High
  18: 5  # $150k+ -> High
  19: 5  # Additional high band
  97: 0  # Refused -> Not reported

# TCS 2022: income not clearly available in raw files examined.
# Will use car_availability + employment as proxy features.
# Set income_group = 0 (not reported) for all 2022 records until field confirmed.
income_2022_field: null   # TBD - requires further questionnaire review

